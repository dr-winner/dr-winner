finite" values="38;38;193;193" keyTimes="0;0.1923;0.2500;1"/><animate attributeName="opacity" dur="13.0s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.1923;0.1933;0.2500;0.2700;1"/></rect><clipPath id="c3"><rect x="36" y="167" width="0" height="28"><animate attributeName="width" dur="13.0s" repeatCount="indefinite" values="0;0;670;670" keyTimes="0;0.2615;0.3808;1" calcMode="linear"/></rect></clipPath><g clip-path="url(#c3)"><text x="40" y="185" font-size="18" ><tspan fill="#9fb8a6">SOC Analyst</tspan><tspan fill="#3fb950" font-weight="700">  ·  </tspan><tspan fill="#9fb8a6">Pentester</tspan><tspan fill="#3fb950" font-weight="700">  ·  </tspan><tspan fill="#9fb8a6">AI Engineer</tspan><tspan fill="#3fb950" font-weight="700">  ·  </tspan><tspan fill="#9fb8a6">Web3 Builder</tspan></text></g><rect y="170" x="38" width="10" height="19" fill="#3fb950" opacity="0"><animate attributeName="x" dur="13.0s" repeatCount="indefinite" values="38;38;668;668" keyTimes="0;0.2615;0.3808;1"/><animate attributeName="opacity" dur="13.0s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.2615;0.2625;0.3808;0.4008;1"/></rect><clipPath id="c4"><rect x="36" y="198" width="0" height="28"><animate attributeName="width" dur="13.0s" repeatCount="indefinite" values="0;0;303;303" keyTimes="0;0.4000;0.4769;1" calcMode="linear"/></rect></clipPath><g clip-path="url(#c4)"><text x="40" y="216" font-size="18" ><tspan fill="#3fb950" font-weight="700">❯ </tspan><tspan fill="#c9d6e8">systemctl status --now</tspan></text></g><rect y="201" x="38" width="10" height="19" fill="#3fb950" opacity="0"><animate attributeName="x" dur="13.0s" repeatCount="indefinite" values="38;38;301;301" keyTimes="0;0.4000;0.4769;1"/><animate attributeName="opacity" dur="13.0s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.4000;0.4010;0.4769;0.4969;1"/></rect><clipPath id="c5"><rect x="36" y="229" width="0" height="28"><animate attributeName="width" dur="13.0s" repeatCount="indefinite" values="