<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-label="drWinner — SOC Analyst, Pentester, AI Engineer, Web3 Builder">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0c1424"/>
    <stop offset="1" stop-color="#06090f"/>
  </linearGradient>
  <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#0e1a2e"/>
    <stop offset="1" stop-color="#0a1220"/>
  </linearGradient>
  <radialGradient id="glow" cx="0.5" cy="0.0" r="1.0">
    <stop offset="0" stop-color="#3fb950" stop-opacity="0.12"/>
    <stop offset="0.6" stop-color="#3fb950" stop-opacity="0"/>
  </radialGradient>
  <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#1f9c52" fill-opacity="0.07"/>
  </pattern>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="tglow" x="-40%" y="-60%" width="180%" height="220%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="b"/>
    <feFlood flood-color="#3fb950" flood-opacity="0.85"/>
    <feComposite in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="body"><rect x="9" y="53" width="882" height="258"/></clipPath>
</defs>

<!-- window -->
<rect x="6" y="6" width="888" height="308" rx="16" fill="url(#bg)" stroke="#1a3a2a" stroke-width="1.5"/>
<rect x="6" y="6" width="888" height="308" rx="16" fill="url(#glow)"/>
<g clip-path="url(#body)"><rect x="9" y="53" width="882" height="258" fill="url(#grid)"/></g>

<!-- title bar -->
<g font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Consolas,monospace">
  <circle cx="34" cy="30" r="6.5" fill="#ff5f57"/><circle cx="56" cy="30" r="6.5" fill="#f0b429"/><circle cx="78" cy="30" r="6.5" fill="#3fb950"/>
  <text x="450.0" y="35" text-anchor="middle" font-size="13.5" fill="#6b8a76" letter-spacing="0.5">dr-winner@soc: ~/profile</text>
  <!-- signal bars (right) -->
  <g transform="translate(830,20)"><rect x="0" y="16" width="5" height="6" rx="1.5" fill="#3fb950" fill-opacity="0.75"><animate attributeName="height" dur="1.8s" repeatCount="indefinite" values="6;2;6;4;6" keyTimes="0;0.25;0.5;0.75;1"/><animate attributeName="y" dur="1.8s" repeatCount="indefinite" values="16;20;16;18;16" keyTimes="0;0.25;0.5;0.75;1"/></rect><rect x="8" y="12" width="5" height="10" rx="1.5" fill="#3fb950" fill-opacity="0.75"><animate attributeName="height" dur="1.8s" repeatCount="indefinite" values="10;4;10;6;10" keyTimes="0;0.25;0.5;0.75;1"/><animate attributeName="y" dur="1.8s" repeatCount="indefinite" values="12;18;12;16;12" keyTimes="0;0.25;0.5;0.75;1"/></rect><rect x="16" y="8" width="5" height="14" rx="1.5" fill="#3fb950" fill-opacity="0.75"><animate attributeName="height" dur="1.8s" repeatCount="indefinite" values="14;6;14;8;14" keyTimes="0;0.25;0.5;0.75;1"/><animate attributeName="y" dur="1.8s" repeatCount="indefinite" values="8;16;8;14;8" keyTimes="0;0.25;0.5;0.75;1"/></rect><rect x="24" y="4" width="5" height="18" rx="1.5" fill="#3fb950" fill-opacity="0.75"><animate attributeName="height" dur="1.8s" repeatCount="indefinite" values="18;7;18;11;18" keyTimes="0;0.25;0.5;0.75;1"/><animate attributeName="y" dur="1.8s" repeatCount="indefinite" values="4;15;4;11;4" keyTimes="0;0.25;0.5;0.75;1"/></rect>  </g>
  <line x1="9" y1="52" x2="891" y2="52" stroke="#16233c" stroke-width="1.2"/>
</g>

<!-- scanline -->
<g clip-path="url(#body)">
  <rect x="9" y="0" width="882" height="2.5" fill="#3fb950" fill-opacity="0.10">
    <animate attributeName="y" dur="6s" repeatCount="indefinite" values="53;306;53" keyTimes="0;0.6;1"/>
  </rect>
</g>

<!-- body -->
