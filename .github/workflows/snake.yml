name: Generate contribution snake

# Renders the contribution-graph "snake" and pushes it to the `output` branch as
# an SVG the README embeds via raw.githubusercontent. Self-hosted on our own
# repo branch, so the image never depends on a live third-party render service.
on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/snake.yml"

permissions:
  contents: write

concurrency:
  group: profile-snake
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVG (emerald theme)
        uses: Platane/snk@v3
        with:
          github_user_name: dr-winner
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=#a855f7&color_dots=#1b1440,#4c1d95,#6d28d9,#7c3aed,#22d3ee

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
