name: Refresh profile stats

# Regenerates the self-hosted stats + heatmap SVGs from live GitHub data and
# commits them. No third-party embed = the profile cards can never rate-limit
# or 503. Runs twice a day, on manual trigger, and when the generator changes.
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/build_stats.py"
      - ".github/workflows/stats.yml"

permissions:
  contents: write

concurrency:
  group: profile-stats
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build stats SVGs
        env:
          # STATS_TOKEN (a classic PAT with read:user + repo) yields the fullest
          # numbers, including private contributions. Falls back to the built-in
          # token, which still works for public data.
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          STATS_USER: dr-winner
        run: python scripts/build_stats.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/command-deck.svg assets/heatmap.svg
          if git diff --staged --quiet; then
            echo "No stat changes."
          else
            git commit -m "chore: refresh profile stats [skip ci]"
            git push
          fi
